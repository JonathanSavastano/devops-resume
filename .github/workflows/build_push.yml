name: Build and Deploy
on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    uses: JonathanSavastano/reusable-workflows/.github/workflows/deploy-static-site.yml@main
    with:
      aws_region: us-east-1
      bucket_name: jonny-devops-resume
      cloudfront_distribution_id: E2J6CXQOUK565Q
      deploy_role_arn: arn:aws:iam::058264116822:role/jonny-devops-resume-github-deploy
      node_version: '24'
      app_directory: app
